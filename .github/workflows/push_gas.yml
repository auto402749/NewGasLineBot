name: 每週油價推播

on:
  schedule:
    # 每週日 13:30 台灣時間（UTC+8）= UTC 05:30
    - cron: '30 5 * * 0'
  # 也可以手動在 GitHub 介面觸發，方便測試
  workflow_dispatch:

jobs:
  push-gas-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行油價推播
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python push_scheduler.py
